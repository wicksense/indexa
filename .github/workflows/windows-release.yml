name: Windows Release

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y

      - name: Build portable EXE (onedir)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --name Indexa --hidden-import indexa.rename --exclude-module PySide6.Qt3DCore --exclude-module PySide6.Qt3DRender --exclude-module PySide6.Qt3DInput --exclude-module PySide6.QtCharts --exclude-module PySide6.QtDataVisualization --exclude-module PySide6.QtMultimedia --exclude-module PySide6.QtMultimediaWidgets --exclude-module PySide6.QtNetworkAuth --exclude-module PySide6.QtPdf --exclude-module PySide6.QtPdfWidgets --exclude-module PySide6.QtPositioning --exclude-module PySide6.QtQml --exclude-module PySide6.QtQuick --exclude-module PySide6.QtQuickControls2 --exclude-module PySide6.QtRemoteObjects --exclude-module PySide6.QtScxml --exclude-module PySide6.QtSensors --exclude-module PySide6.QtSerialBus --exclude-module PySide6.QtSerialPort --exclude-module PySide6.QtSql --exclude-module PySide6.QtStateMachine --exclude-module PySide6.QtSvg --exclude-module PySide6.QtSvgWidgets --exclude-module PySide6.QtTest --exclude-module PySide6.QtTextToSpeech --exclude-module PySide6.QtWebChannel --exclude-module PySide6.QtWebEngineCore --exclude-module PySide6.QtWebEngineWidgets --exclude-module PySide6.QtWebSockets --exclude-module PySide6.QtBluetooth indexa/gui.py

      - name: Build installer EXE (Inno Setup)
        shell: pwsh
        run: |
          iscc build/windows/Indexa.iss

      - name: Package portable zip
        shell: pwsh
        run: |
          Compress-Archive -Path dist/Indexa/* -DestinationPath Indexa-windows-portable.zip

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Indexa-windows
          path: |
            Indexa-windows-portable.zip
            dist/Indexa-Setup.exe

      - name: Upload to GitHub Release (tag builds)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Indexa-windows-portable.zip
            dist/Indexa-Setup.exe
