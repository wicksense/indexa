name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --name Indexa --hidden-import indexa.rename --collect-all PySide6 -m indexa.gui

      - name: Zip artifact
        shell: pwsh
        run: |
          Compress-Archive -Path dist/Indexa/* -DestinationPath Indexa-windows.zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Indexa-windows
          path: Indexa-windows.zip

      - name: Upload to GitHub Release (tag builds)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Indexa-windows.zip
