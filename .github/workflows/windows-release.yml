name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y

      - name: Build portable EXE (onedir)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --name Indexa --hidden-import indexa.rename --collect-all PySide6 indexa/gui.py

      - name: Build installer EXE (Inno Setup)
        shell: pwsh
        run: |
          iscc build/windows/Indexa.iss

      - name: Package portable zip
        shell: pwsh
        run: |
          Compress-Archive -Path dist/Indexa/* -DestinationPath Indexa-windows-portable.zip

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Indexa-windows
          path: |
            Indexa-windows-portable.zip
            dist/Indexa-Setup.exe

      - name: Upload to GitHub Release (tag builds)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Indexa-windows-portable.zip
            dist/Indexa-Setup.exe
